<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ортосити — Личный кабинет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { background-color: #4B73E5; color: white; }
        .tab-inactive { background-color: #EDF2F7; color: #2D3139; }
        .custom-shadow { box-shadow: 0 4px 20px -2px rgba(75, 115, 229, 0.1); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#2D3139]">

    <div id="root"></div>

    <script>
        // Имитация состояния приложения
        let state = {
            view: 'list', // list, select_items, form, success
            selectedOrderId: null,
            selectedItems: [],
            orders: [
                {
                    id: '162',
                    date: '02.04.2026 22:32',
                    status: 'Доставлен',
                    total: 8590,
                    shop: 'Махачкала',
                    items: [
                        { id: 101, name: 'Стельки ортопедические индивидуальные', price: 4500, image: '🩹', isMarked: true },
                        { id: 102, name: 'Бандаж коленный компрессионный', price: 4090, image: '🦵', isMarked: false }
                    ]
                },
                {
                    id: '159',
                    date: '30.03.2026 10:15',
                    status: 'Отгружен',
                    total: 1200,
                    shop: 'Каспийск',
                    items: [
                        { id: 104, name: 'Корректор осанки', price: 1200, image: '🧘', isMarked: true }
                    ]
                },
                {
                    id: '145',
                    date: '15.03.2026 14:20',
                    status: 'Возвращён',
                    total: 3200,
                    shop: 'Махачкала',
                    items: [
                        { id: 105, name: 'Подушка ортопедическая', price: 3200, image: '☁️', isMarked: false }
                    ]
                }
            ]
        };

        function render() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <!-- Header -->
                <header class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between sticky top-0 z-50">
                    <div class="flex items-center gap-8">
                        <div class="text-[#4B73E5] font-black text-2xl tracking-tighter">ОРТОСИТИ</div>
                        <button class="bg-[#4B73E5] text-white px-6 py-2 rounded-md flex items-center gap-2 font-medium">
                            <i data-lucide="layout-grid" class="w-5 h-5"></i> Каталог
                        </button>
                    </div>
                    <div class="flex-1 max-w-2xl mx-12 relative">
                        <input type="text" placeholder="Я ищу..." class="w-full bg-[#F3F6F9] rounded-md py-2.5 px-4 outline-none">
                        <i data-lucide="search" class="absolute right-4 top-2.5 text-gray-400 w-5 h-5"></i>
                    </div>
                    <div class="flex items-center gap-6 text-gray-500 text-sm">
                        <div class="flex flex-col items-center gap-1 text-[#4B73E5]"><i data-lucide="user" class="w-5 h-5"></i> Кабинет</div>
                        <div class="flex flex-col items-center gap-1"><i data-lucide="heart" class="w-5 h-5"></i> Избранное</div>
                        <div class="flex flex-col items-center gap-1"><i data-lucide="shopping-bag" class="w-5 h-5"></i> Корзина</div>
                    </div>
                </header>

                <main class="max-w-[1400px] mx-auto flex gap-8 p-8">
                    <!-- Sidebar -->
                    <aside class="w-64 shrink-0">
                        <div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm">
                            <nav class="space-y-1 text-gray-600">
                                <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 rounded-lg"><i data-lucide="user" class="w-4 h-4"></i> Профиль</div>
                                <div class="flex items-center gap-3 px-4 py-3 text-[#4B73E5] bg-blue-50 font-bold rounded-lg cursor-pointer">
                                    <i data-lucide="shopping-bag" class="w-4 h-4"></i> Заказы
                                </div>
                                <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 rounded-lg"><i data-lucide="heart" class="w-4 h-4"></i> Избранное</div>
                                <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 rounded-lg"><i data-lucide="settings" class="w-4 h-4"></i> Настройки</div>
                            </nav>
                        </div>
                    </aside>

                    <!-- Content Area -->
                    <section class="flex-1">
                        ${renderView()}
                    </section>
                </main>
            `;
            lucide.createIcons();
        }

        function renderView() {
            if (state.view === 'list') return renderOrdersList();
            if (state.view === 'select_items') return renderSelectItems();
            if (state.view === 'form') return renderReturnForm();
            if (state.view === 'success') return renderSuccess();
        }

        function renderOrdersList() {
            return `
                <h2 class="text-4xl font-black mb-8 uppercase tracking-tight">Заказы</h2>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="flex gap-4 p-6 border-b border-gray-100">
                        <button class="px-6 py-2 rounded-md font-bold tab-active">Все</button>
                        <button class="px-6 py-2 rounded-md font-bold tab-inactive">Активные</button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-[#F8FAFC] text-gray-400 text-[11px] font-bold uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-4">№ Заказа</th>
                                <th class="px-6 py-4">Дата</th>
                                <th class="px-6 py-4">Сумма</th>
                                <th class="px-6 py-4 text-center">Состояние</th>
                                <th class="px-6 py-4 text-center">Действие</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            ${state.orders.map(order => `
                                <tr class="text-sm hover:bg-gray-50/30 transition-colors">
                                    <td class="px-6 py-6 font-bold">${order.id}</td>
                                    <td class="px-6 py-6 text-gray-500">${order.date}</td>
                                    <td class="px-6 py-6 font-black">${order.total.toLocaleString()} ₽</td>
                                    <td class="px-6 py-6 text-center">
                                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${getStatusClass(order.status)}">
                                            ${order.status}
                                        </span>
                                    </td>
                                    <td class="px-6 py-6 text-center">
                                        ${order.status === 'Доставлен' ? `
                                            <button onclick="startReturn('${order.id}')" class="text-[#4B73E5] font-black border border-blue-100 bg-blue-50 px-3 py-1.5 rounded uppercase text-[10px] hover:bg-[#4B73E5] hover:text-white transition-all">
                                                Вернуть товар
                                            </button>
                                        ` : order.status === 'Возвращён' ? `
                                            <span class="text-gray-400 text-[10px] font-bold uppercase">Завершен</span>
                                        ` : `
                                            <button class="text-gray-400 font-bold text-[10px] uppercase cursor-default">В обработке</button>
                                        `}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderSelectItems() {
            const order = state.orders.find(o => o.id === state.selectedOrderId);
            return `
                <div class="bg-white rounded-xl p-8 border border-gray-100">
                    <div class="flex items-center gap-3 mb-8">
                        <button onclick="setView('list')" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="chevron-left"></i></button>
                        <h3 class="text-2xl font-black uppercase">Выберите товары</h3>
                    </div>
                    <div class="grid gap-4 mb-8">
                        ${order.items.map(item => `
                            <div onclick="toggleItem(${item.id})" class="flex items-center gap-6 p-6 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedItems.includes(item.id) ? 'border-[#4B73E5] bg-blue-50/30' : 'border-gray-100'}">
                                <div class="w-6 h-6 rounded border-2 flex items-center justify-center ${state.selectedItems.includes(item.id) ? 'bg-[#4B73E5] border-[#4B73E5]' : 'border-gray-300'}">
                                    ${state.selectedItems.includes(item.id) ? '<i data-lucide="check" class="text-white w-4 h-4"></i>' : ''}
                                </div>
                                <div class="text-4xl w-20 h-20 bg-gray-50 rounded-xl flex items-center justify-center">${item.image}</div>
                                <div class="flex-1">
                                    <div class="flex justify-between">
                                        <h4 class="font-bold text-lg">${item.name}</h4>
                                        ${item.isMarked ? '<span class="text-[10px] bg-gray-100 px-2 py-1 rounded font-bold text-gray-500 uppercase tracking-widest">Маркирован</span>' : ''}
                                    </div>
                                    <p class="text-[#4B73E5] font-black">${item.price.toLocaleString()} ₽</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="setView('form')" ${state.selectedItems.length === 0 ? 'disabled' : ''} class="w-full py-5 bg-[#4B73E5] text-white rounded-xl font-black uppercase tracking-widest disabled:opacity-50 shadow-lg shadow-blue-100">
                        Оформить возврат (${state.selectedItems.length})
                    </button>
                </div>
            `;
        }

        function renderReturnForm() {
            return `
                <div class="bg-white rounded-xl p-8 border border-gray-100 max-w-2xl mx-auto">
                    <div class="flex items-center gap-3 mb-8">
                        <button onclick="setView('select_items')" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="chevron-left"></i></button>
                        <h3 class="text-2xl font-black uppercase">Причина возврата</h3>
                    </div>
                    <div class="space-y-6">
                        <select class="w-full p-4 bg-[#F3F6F9] rounded-xl outline-none font-bold">
                            <option>Не подошел размер</option>
                            <option>Брак/Дефект</option>
                        </select>
                        <textarea placeholder="Ваш комментарий..." class="w-full p-4 bg-[#F3F6F9] rounded-xl outline-none h-32"></textarea>
                        <div class="p-4 bg-blue-50 rounded-xl flex gap-3 text-sm text-blue-800">
                            <i data-lucide="shield-check" class="shrink-0"></i>
                            <p>Коды маркировки "Честный ЗНАК" будут переданы в 1С и ЮKassa автоматически.</p>
                        </div>
                        <button onclick="finishReturn()" class="w-full py-5 bg-[#2D3139] text-white rounded-xl font-black uppercase tracking-widest">Отправить в 1С</button>
                    </div>
                </div>
            `;
        }

        function renderSuccess() {
            return `
                <div class="bg-white rounded-xl p-16 border border-gray-100 text-center">
                    <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="check-circle" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-3xl font-black uppercase mb-4">Заявка принята</h3>
                    <p class="text-gray-500 mb-8 font-medium">Статус заказа будет изменен на «Запрошен возврат» после синхронизации с 1С.</p>
                    <button onclick="setView('list')" class="px-10 py-4 bg-[#4B73E5] text-white rounded-xl font-black uppercase tracking-widest">К списку заказов</button>
                </div>
            `;
        }

        // Вспомогательные функции
        function setView(v) { state.view = v; render(); }
        function startReturn(id) { state.selectedOrderId = id; state.selectedItems = []; state.view = 'select_items'; render(); }
        function toggleItem(id) {
            const idx = state.selectedItems.indexOf(id);
            if (idx > -1) state.selectedItems.splice(idx, 1);
            else state.selectedItems.push(id);
            render();
        }
        function finishReturn() {
            const order = state.orders.find(o => o.id === state.selectedOrderId);
            order.status = 'Запрошен возврат';
            state.view = 'success';
            render();
        }
        function getStatusClass(s) {
            if (s === 'Доставлен') return 'text-green-600 bg-green-50';
            if (s === 'Запрошен возврат') return 'text-orange-600 bg-orange-50';
            if (s === 'Возвращён') return 'text-gray-500 bg-gray-100';
            return 'text-blue-600 bg-blue-50';
        }

        // Инициализация
        window.onload = render;
    </script>
</body>
</html>
